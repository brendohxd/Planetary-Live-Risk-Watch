<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Risk Watch • Transparent Global Risk Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <nav class="border-b border-slate-800 bg-slate-950/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-globe text-white text-2xl"></i>
                </div>
                <span class="font-display text-2xl font-semibold tracking-tighter">Earth Risk Watch</span>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-10 pb-8">
        <h1 class="font-display text-5xl font-semibold tracking-tighter mb-2">Earth Risk Watch</h1>
        <p class="text-slate-400">Transparent, data-driven global risk monitoring</p>
    </div>

    <div class="max-w-screen-2xl mx-auto px-8">
        <!-- Doomsday -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 mb-8 max-w-md">
            <div class="flex justify-between items-start">
                <div>
                    <div class="text-emerald-400 text-xs font-semibold tracking-widest">DOOMSDAY CLOCK</div>
                    <div id="doomsday-value" class="text-6xl font-semibold text-red-400 mt-1"></div>
                </div>
            </div>
            <div id="doomsday-assessment" class="text-sm text-slate-300 mt-4"></div>
        </div>

        <!-- Bar Chart -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 mb-8">
            <div class="font-semibold mb-4 text-xl">Risk Scores by Category</div>
            <canvas id="riskBar" height="380"></canvas>
        </div>

        <!-- Category Cards -->
        <div class="mb-4 font-semibold text-xl">Risk Categories (click for details)</div>
        <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12"></div>
    </div>

    <!-- Modal -->
    <div id="modal" onclick="hideModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-slate-900 border border-slate-700 rounded-3xl max-w-2xl w-full max-h-[85vh] overflow-auto">
            <div class="p-8" id="modalContent"></div>
        </div>
    </div>

    <script>
        let riskData = null;

        async function loadData() {
            const res = await fetch('risk-data.json');
            riskData = await res.json();
            renderAll();
        }

        function renderAll() {
            // Doomsday
            const clock = riskData.doomsday_clock;
            document.getElementById('doomsday-value').innerHTML = clock.seconds_to_midnight + '<span class="text-xl align-super">s</span>';
            document.getElementById('doomsday-assessment').innerHTML = clock.assessment;

            // Bar Chart
            const ctx = document.getElementById('riskBar');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: riskData.categories.map(c => c.name),
                    datasets: [{
                        data: riskData.categories.map(c => c.score),
                        backgroundColor: riskData.categories.map(c => c.level === 'High' ? '#f59e0b' : c.level === 'Moderate' ? '#eab308' : '#10b981')
                    }]
                },
                options: { indexAxis: 'y', scales: { x: { max: 3 } }, plugins: { legend: { display: false } } }
            });

            // Category Cards
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            riskData.categories.forEach((cat, index) => {
                const color = cat.level === 'High' ? 'orange' : cat.level === 'Moderate' ? 'yellow' : 'emerald';
                const div = document.createElement('div');
                div.className = 'risk-card bg-slate-900 border border-slate-700 rounded-3xl p-6 cursor-pointer';
                div.innerHTML = `
                    <div class="flex justify-between">
                        <div class="font-semibold">${cat.name}</div>
                        <span class="risk-badge bg-${color}-500/20 text-${color}-400">${cat.level}</span>
                    </div>
                    <div class="mt-3 text-sm text-slate-300">${cat.metrics}</div>
                    <div class="mt-4 text-xs text-emerald-400">Click for incidents & sources →</div>
                `;
                div.onclick = () => showCategoryModal(index);
                grid.appendChild(div);
            });
        }

        function showCategoryModal(index) {
            const cat = riskData.categories[index];
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <div class="font-display text-2xl font-semibold">${cat.name}</div>
                        <span class="risk-badge bg-yellow-500/20 text-yellow-400 mt-1 inline-block">${cat.level} (${cat.score}/3)</span>
                    </div>
                    <button onclick="hideModal()" class="text-3xl leading-none">&times;</button>
                </div>

                <div class="mb-6">
                    <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">KEY METRICS & EVENTS</div>
                    <div class="text-sm">${cat.metrics}</div>
                </div>

                <div class="mb-6">
                    <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">SOURCES & DATA</div>
                    <div class="text-sm">${cat.sources_compared}</div>
                    <div class="mt-2 text-xs text-emerald-400">Discrepancies: ${cat.discrepancies}</div>
                </div>

                <div class="mb-6">
                    <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">CONSERVATIVE ASSESSMENT</div>
                    <div class="bg-slate-800 p-4 rounded-2xl text-sm">${cat.conservative_reading}</div>
                </div>

                <div>
                    <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">PREPARATION PRIORITY</div>
                    <div class="text-sm">${cat.prep_priority}</div>
                </div>
            `;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        window.onload = loadData;
    </script>
</body>
</html>
