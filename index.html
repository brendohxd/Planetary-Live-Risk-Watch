<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Risk Watch • Transparent Global Risk Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <nav class="border-b border-slate-800 bg-slate-950/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-globe text-white text-2xl"></i>
                </div>
                <span class="font-display text-2xl font-semibold tracking-tighter">Earth Risk Watch</span>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-10 pb-8">
        <h1 class="font-display text-5xl font-semibold tracking-tighter mb-2">Earth Risk Watch</h1>
        <p class="text-slate-400">Transparent, data-driven global risk monitoring</p>
    </div>

    <div class="max-w-screen-2xl mx-auto px-8">
        <!-- Doomsday Clock Visual -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 mb-8 max-w-lg mx-auto">
            <div class="text-center mb-4">
                <div class="text-emerald-400 text-xs font-semibold tracking-[2px]">SYMBOLIC INDICATOR</div>
                <div class="font-display text-3xl font-semibold tracking-tight mt-1">Doomsday Clock</div>
            </div>

            <!-- Visual Clock -->
            <div class="flex justify-center my-6">
                <svg id="doomsday-clock" width="280" height="280" viewBox="0 0 280 280">
                    <!-- Clock face -->
                    <circle cx="140" cy="140" r="120" fill="none" stroke="#334155" stroke-width="12"/>
                    
                    <!-- Hour marks -->
                    <g stroke="#64748b" stroke-width="4">
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(0 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(30 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(60 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(90 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(120 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(150 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(180 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(210 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(240 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(270 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(300 140 140)"/>
                        <line x1="140" y1="30" x2="140" y2="50" transform="rotate(330 140 140)"/>
                    </g>
                    
                    <!-- Midnight label -->
                    <text x="140" y="55" fill="#ef4444" font-size="14" font-weight="600" text-anchor="middle">MIDNIGHT</text>
                    
                    <!-- Hand (will be rotated by JS) -->
                    <g id="clock-hand">
                        <line x1="140" y1="140" x2="140" y2="55" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
                        <circle cx="140" cy="140" r="8" fill="#ef4444"/>
                    </g>
                </svg>
            </div>

            <div class="text-center">
                <div id="doomsday-value" class="text-7xl font-semibold tabular-nums text-red-400"></div>
                <div class="text-sm text-slate-400 -mt-1">SECONDS TO MIDNIGHT</div>
            </div>

            <div id="doomsday-assessment" class="text-sm text-slate-300 mt-4 text-center"></div>
        </div>

        <!-- Bar Chart -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 mb-8">
            <div class="font-semibold mb-4 text-xl">Risk Scores by Category</div>
            <canvas id="riskBar" height="380"></canvas>
        </div>

        <!-- Category Cards -->
        <div class="mb-4 font-semibold text-xl">Risk Categories (click for details)</div>
        <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12"></div>
    </div>

    <script>
        let riskData = null;

        async function loadData() {
            const res = await fetch('risk-data.json');
            riskData = await res.json();
            renderAll();
        }

        function renderAll() {
            const clock = riskData.doomsday_clock;

            // Update value
            document.getElementById('doomsday-value').innerHTML = clock.seconds_to_midnight;
            document.getElementById('doomsday-assessment').innerHTML = clock.assessment;

            // Rotate the clock hand
            const seconds = clock.seconds_to_midnight;
            const degrees = (seconds / 120) * 360; // 120 seconds = full circle
            const hand = document.getElementById('clock-hand');
            hand.setAttribute('transform', `rotate(${degrees} 140 140)`);

            // Bar Chart
            const ctx = document.getElementById('riskBar');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: riskData.categories.map(c => c.name),
                    datasets: [{
                        data: riskData.categories.map(c => c.score),
                        backgroundColor: riskData.categories.map(c => 
                            c.level === 'High' ? '#f59e0b' : c.level === 'Moderate' ? '#eab308' : '#10b981'
                        )
                    }]
                },
                options: { indexAxis: 'y', scales: { x: { max: 3 } }, plugins: { legend: { display: false } } }
            });

            // Category Cards
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            riskData.categories.forEach((cat, index) => {
                const color = cat.level === 'High' ? 'orange' : cat.level === 'Moderate' ? 'yellow' : 'emerald';
                const div = document.createElement('div');
                div.className = 'risk-card bg-slate-900 border border-slate-700 rounded-3xl p-6 cursor-pointer';
                div.innerHTML = `
                    <div class="flex justify-between">
                        <div class="font-semibold">${cat.name}</div>
                        <span class="risk-badge bg-${color}-500/20 text-${color}-400">${cat.level}</span>
                    </div>
                    <div class="mt-3 text-sm text-slate-300">${cat.metrics}</div>
                    <div class="mt-4 text-xs text-emerald-400">Click for details →</div>
                `;
                div.onclick = () => showCategoryModal(index);
                grid.appendChild(div);
            });
        }

        function showCategoryModal(index) {
            const cat = riskData.categories[index];
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4';
            modal.innerHTML = `
                <div class="bg-slate-900 border border-slate-700 rounded-3xl max-w-2xl w-full p-8" onclick="event.target.closest('.fixed').remove()">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <div class="font-display text-2xl font-semibold">${cat.name}</div>
                            <span class="risk-badge bg-yellow-500/20 text-yellow-400 mt-1 inline-block">${cat.level} (${cat.score}/3)</span>
                        </div>
                        <button onclick="event.target.closest('.fixed').remove()" class="text-3xl">&times;</button>
                    </div>

                    <div class="mb-6">
                        <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">KEY METRICS & EVENTS</div>
                        <div class="text-sm">${cat.metrics}</div>
                    </div>

                    <div class="mb-6">
                        <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">SOURCES</div>
                        <div class="text-sm">${cat.sources_compared}</div>
                        <div class="mt-2 text-xs text-emerald-400">${cat.discrepancies}</div>
                    </div>

                    <div>
                        <div class="text-xs uppercase tracking-widest text-slate-400 mb-1">CONSERVATIVE VIEW</div>
                        <div class="bg-slate-800 p-4 rounded-2xl text-sm">${cat.conservative_reading}</div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        window.onload = loadData;
    </script>
</body>
</html>
