<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Risk Watch • Transparent Global Risk Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <nav class="border-b border-slate-800 bg-slate-950/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-emerald-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-globe text-white text-2xl"></i>
                </div>
                <span class="font-display text-2xl font-semibold tracking-tighter">Earth Risk Watch</span>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-8 pt-10 pb-8">
        <h1 class="font-display text-5xl font-semibold tracking-tighter mb-2">Earth Risk Watch</h1>
        <p class="text-slate-400">Transparent, data-driven global risk monitoring</p>
    </div>

    <div class="max-w-screen-2xl mx-auto px-8">
        <!-- Doomsday -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 mb-8 max-w-md">
            <div class="flex justify-between">
                <div>
                    <div class="text-emerald-400 text-xs font-semibold tracking-widest">DOOMSDAY CLOCK</div>
                    <div id="doomsday-value" class="text-6xl font-semibold text-red-400 mt-1"></div>
                </div>
            </div>
            <div id="doomsday-assessment" class="text-sm text-slate-300 mt-3"></div>
        </div>

        <!-- Main Bar Chart -->
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8 mb-8">
            <div class="font-semibold mb-4 text-xl">Risk Scores by Category</div>
            <canvas id="riskBar" height="380"></canvas>
        </div>

        <!-- Category Cards -->
        <div class="mb-4 font-semibold text-xl">Category Details</div>
        <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('risk-data.json');
                const data = await res.json();
                renderAll(data);
            } catch (e) {
                console.error('Failed to load data', e);
                document.body.innerHTML = '<div class="p-8 text-red-400">Error loading risk data. Please refresh.</div>';
            }
        }

        function renderAll(data) {
            // Doomsday
            const clock = data.doomsday_clock;
            document.getElementById('doomsday-value').innerHTML = clock.seconds_to_midnight + '<span class="text-xl align-super">s</span>';
            document.getElementById('doomsday-assessment').innerHTML = clock.assessment;

            // Bar Chart
            const ctx = document.getElementById('riskBar');
            const labels = data.categories.map(c => c.name);
            const scores = data.categories.map(c => c.score);
            const colors = data.categories.map(c => c.level === 'High' ? '#f59e0b' : c.level === 'Moderate' ? '#eab308' : '#10b981');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: scores,
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    scales: { x: { max: 3, ticks: { stepSize: 1 } } },
                    plugins: { legend: { display: false } }
                }
            });

            // Category Cards
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            data.categories.forEach(cat => {
                const color = cat.level === 'High' ? 'orange' : cat.level === 'Moderate' ? 'yellow' : 'emerald';
                const div = document.createElement('div');
                div.className = 'bg-slate-900 border border-slate-700 rounded-3xl p-6';
                div.innerHTML = `
                    <div class="flex justify-between">
                        <div class="font-semibold">${cat.name}</div>
                        <span class="risk-badge bg-${color}-500/20 text-${color}-400">${cat.level}</span>
                    </div>
                    <div class="mt-3 text-sm text-slate-300">${cat.metrics}</div>
                    <div class="mt-4 text-xs text-slate-400">Score: <span class="font-mono text-white">${cat.score}/3</span></div>
                `;
                grid.appendChild(div);
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
